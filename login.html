<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Login - The Reality Show</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="tk.css">

<style>

.login-section{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.login-box{
background:rgba(0,0,0,0.9);
padding:40px;
border-radius:10px;
width:380px;
text-align:center;
box-shadow:0 0 40px rgba(255,0,0,0.4);
}

.login-box h2{
color:white;
margin-bottom:20px;
}

.login-box button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.google-btn{
background:white;
color:black;
}

</style>

</head>

<body>
<script type="module" src="firebase.js"></script>
<header>

<div class="logo">THE TARUN KUMAR STUDIO</div>

<nav>
<a href="index.html">Home</a>
</nav>

</header>


<section class="login-section">

<div class="login-box">

<h2>Secure Login</h2>

<button onclick="googleLogin()" class="google-btn">
Sign in with Google
</button>

</div>

</section>


<script type="module">

import { auth } from "./firebase.js";

import { GoogleAuthProvider, signInWithPopup }

from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

function googleLogin(){

const provider = new GoogleAuthProvider();

signInWithPopup(auth, provider)

.then((result)=>{

window.location="dashboard.html";

})

.catch((error)=>{

alert(error.message);

});

}

window.googleLogin = googleLogin;

</script>

</body>
</html>
