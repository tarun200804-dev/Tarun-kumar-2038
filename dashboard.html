<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dashboard - Reality Show</title>

<link rel="stylesheet" href="style.css">

<style>

.dashboard{

text-align:center;
margin-top:120px;
color:white;

}

.logout-btn{

padding:12px 25px;
background:red;
border:none;
color:white;
cursor:pointer;

}

</style>

</head>

<body>

<header>

<div class="logo">THE TARUN KUMAR STUDIO</div>

</header>

<div class="dashboard">

<h1>Investigator Dashboard</h1>

<p id="userEmail"></p>

<button onclick="logout()" class="logout-btn">
Logout
</button>

</div>


<script type="module">

import { auth } from "./firebase.js";

import { onAuthStateChanged, signOut }

from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("userEmail").innerText =
"Logged in as: " + user.email;

}

else{

window.location="login.html";

}

});

function logout(){

signOut(auth).then(()=>{

window.location="index.html";

});

}

window.logout = logout;

</script>

</body>
</html>
